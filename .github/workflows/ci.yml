name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy the tested dist artifact to the production host"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: portal-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test And Build Portal
    runs-on: ubuntu-latest
    env:
      VITE_TENCENT_MAP_KEY: ${{ secrets.VITE_TENCENT_MAP_KEY || secrets.TENCENT_MAP_KEY || 'OM3BZ-JN3W5-XHPI3-IFVNF-57YME-TDBB4' }}
      VITE_CAP_API_ENDPOINT: ${{ secrets.VITE_CAP_API_ENDPOINT || 'https://cap.timecampus.asia/2030d4d5e7/' }}
      VITE_SKIP_CAPTCHA: "false"
      VITE_ADMIN_REDIRECT: "true"
      VITE_ADMIN_DOMAIN: admin.timecampus.asia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Agent workbench E2E
        run: pnpm test:e2e

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: timecampus-portal-${{ github.sha }}
          path: dist/
          if-no-files-found: error

  deploy:
    name: Deploy Portal Artifact
    needs: build
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    env:
      SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
      SERVER_USERNAME: ${{ secrets.DEPLOY_USERNAME || secrets.DEPLOY_USER }}
      SERVER_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: timecampus-portal-${{ github.sha }}
          path: dist

      - name: Upload dist
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USERNAME }}
          password: ${{ env.SERVER_PASSWORD }}
          source: "dist/**"
          target: "/home/${{ env.SERVER_USERNAME }}/portal-incoming/${{ github.sha }}"
          strip_components: 1

      - name: Activate dist
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USERNAME }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            APP_DIR="$HOME/app/dist"
            INCOMING="$HOME/portal-incoming/${{ github.sha }}"
            RELEASE_DIR="$HOME/app/dist.release-${{ github.sha }}"
            BACKUP_DIR="$HOME/app/backups/dist-$(date +%Y%m%d%H%M%S)"

            case "$APP_DIR" in "$HOME/app/dist") ;; *) exit 1 ;; esac
            case "$RELEASE_DIR" in "$HOME/app/dist.release-"*) ;; *) exit 1 ;; esac
            test -f "$INCOMING/index.html"

            rm -rf "$RELEASE_DIR"
            mv "$INCOMING" "$RELEASE_DIR"
            mkdir -p "$HOME/app/backups"
            if [ -d "$APP_DIR" ]; then mv "$APP_DIR" "$BACKUP_DIR"; fi
            mv "$RELEASE_DIR" "$APP_DIR"
            chmod -R a+rX "$APP_DIR"

            if ! sudo nginx -t; then
              rm -rf "$APP_DIR"
              if [ -d "$BACKUP_DIR" ]; then mv "$BACKUP_DIR" "$APP_DIR"; fi
              exit 1
            fi
            sudo systemctl reload nginx
            curl -fsS https://www.timecampus.asia/ >/dev/null
            find "$HOME/app/backups" -maxdepth 1 -type d -name 'dist-*' \
              -printf '%T@ %p\n' | sort -nr | tail -n +6 | cut -d' ' -f2- | xargs -r rm -rf
            echo "Portal artifact is healthy"
