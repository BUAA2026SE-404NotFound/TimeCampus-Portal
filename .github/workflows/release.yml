name: release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build And Deploy On Tencent Cloud
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
      SERVER_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
      SERVER_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      DEPLOY_BRANCH: main

    steps:
      - name: Deploy on cloud server
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USERNAME != '' && env.SERVER_PASSWORD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USERNAME }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            set -e

            REPO_DIR=~/TimeCampus-Portal
            APP_DIR=/var/www/timecampus/portal
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Repository not found: $REPO_DIR"
              exit 1
            fi

            cd "$REPO_DIR"
            git checkout ${{ env.DEPLOY_BRANCH }}
            git pull origin ${{ env.DEPLOY_BRANCH }}

            if ! command -v pnpm > /dev/null 2>&1; then
              echo "pnpm is not installed on the server"
              exit 1
            fi

            pnpm install
            if ! timeout 120s pnpm run build; then
              echo "Build failed or timed out after 120 seconds"
              exit 1
            fi

            sudo mkdir -p "$APP_DIR"
            sudo rm -rf "$APP_DIR"/*
            sudo cp -r dist/* "$APP_DIR"/
            sudo systemctl reload nginx

            echo "Deployment completed successfully!"
